name: Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: Publish even if no commits since last release
        type: boolean
        default: false
        required: false
      bump:
        description: Version bump strategy
        type: choice
        options:
          - auto
          - patch
          - minor
        default: auto
        required: false
  schedule:
    - cron: "0 15 * * 1"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'TryGhost/ghst'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Determine whether to publish and bump strategy
        id: gate
        shell: bash
        run: |
          INPUT_BUMP="${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'auto' }}"
          FORCE="false"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force }}" == "true" ]]; then
            FORCE="true"
          fi

          LAST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          RANGE="HEAD"
          if [[ -n "$LAST_TAG" ]]; then
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMIT_COUNT=$(git rev-list "${RANGE}" --count)
          if [[ "${COMMIT_COUNT}" -eq 0 && "${FORCE}" != "true" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No commits since ${LAST_TAG}; skipping."
            exit 0
          fi

          if [[ "${INPUT_BUMP}" == "patch" || "${INPUT_BUMP}" == "minor" ]]; then
            BUMP_KIND="${INPUT_BUMP}"
          elif [[ "${COMMIT_COUNT}" -eq 0 ]]; then
            BUMP_KIND="patch"
          else
            NON_RENOVATE_COUNT=$(git log --format='%an <%ae>' "${RANGE}" | awk 'BEGIN{IGNORECASE=1} !/renovate/ {count++} END {print count+0}')
            if [[ "${NON_RENOVATE_COUNT}" -eq 0 ]]; then
              BUMP_KIND="patch"
            else
              BUMP_KIND="minor"
            fi
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "bump_kind=${BUMP_KIND}" >> "$GITHUB_OUTPUT"
          echo "Using ${BUMP_KIND} bump strategy."

      - name: Validate
        if: steps.gate.outputs.publish == 'true'
        run: pnpm lint && pnpm typecheck && pnpm test && pnpm build

      - name: Bump release version
        id: version
        if: steps.gate.outputs.publish == 'true'
        shell: bash
        run: |
          if [[ "${{ steps.gate.outputs.bump_kind }}" == "patch" ]]; then
            npm version patch --no-git-tag-version
          else
            npm version minor --no-git-tag-version
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.gate.outputs.publish == 'true'
        shell: bash
        run: |
          # Force npm trusted publishing (OIDC) path instead of token auth.
          unset NODE_AUTH_TOKEN
          if [[ "${{ github.event.repository.private }}" == "true" ]]; then
            npm publish --access public
          else
            npm publish --provenance --access public
          fi

      - name: Commit and tag release version
        if: steps.gate.outputs.publish == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${{ steps.version.outputs.version }} [skip ci]"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"
